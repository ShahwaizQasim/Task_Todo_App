<!doctype html>

<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Todo App</title>
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css"
    />
    <link rel="stylesheet" href="style.css" />
  </head>

  <body>
    <div class="container-fluid">
      <!-- header  -->
      <div class="row">
        <div class="col-12 text-center py-4 navbar_bg">
          <img src="./img/UIElement1.png" alt="Todo Logo" class="logo_img" />
        </div>
      </div>

      <!-- tabs -->
      <div class="row text-center tab-row">
        <div class="col-6 col-sm-6 tab-active py-3">
          <h3 class="tab active" data-tab="personal">Personal</h3>
        </div>
        <div class="col-6 col-sm-6 py-3">
          <h3 class="tab" data-tab="professional">Professional</h3>
        </div>
      </div>

      <!-- Input -->
      <div class="container m-auto">
        <div class="row mt-4">
          <div class="col-12 col-sm-4 col-md-6 col-lg-7 m-auto">
            <div class="task-input">
              <input
                type="text"
                id="taskInput"
                placeholder="What do you need to do?"
              />
              <button id="addBtn">ADD</button>
            </div>
          </div>
        </div>

        <div class="row">
          <div class="col-12 col-sm-4 col-md-6 col-lg-7 m-auto">
            <div class="todo-container">
              <!-- Task List -->

              <div id="taskList" style="cursor: pointer;"></div>

              <!-- Clear Completed -->

              <div class="clear-btn" id="clearBtn">
                <i class="fa-solid fa-xmark"></i> Clear Completed
              </div>
            </div>
          </div>
        </div>
      </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script src="script.js"></script>
  </body>
</html>
